<!DOCTYPE html>
<html>
<head>
    <title>Robot Camera Stream</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #222; color: white; }
        img { border: 2px solid #444; max-width: 90%; }
        button { padding: 15px 30px; font-size: 18px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Robot Live Feed</h1>
    <img src="{{ url_for('video_feed') }}">
    <br>
    <button onclick="takePicture()">Capture Image</button>
    <p id="status"></p>

    <script>
        function takePicture() {
            fetch('/capture', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('status').innerText = "Saved: " + data.filename;
                });
        }
    </script>
</body>
</html>
